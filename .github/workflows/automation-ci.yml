name: automation-ci

on:
  push:
    paths:
      - "services/automation/**"
      - "supabase/migrations/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/automation-ci.yml"
  pull_request:
    paths:
      - "services/automation/**"
      - "supabase/migrations/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/automation-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @whatsapp-saas/automation typecheck

      - name: Lint
        run: pnpm --filter @whatsapp-saas/automation lint

      - name: Test
        run: pnpm --filter @whatsapp-saas/automation test
